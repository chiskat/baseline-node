name: Build and Push Docker Images

on:
  push:

jobs:
  build-node20:
    name: baseline-node20 (slim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: chiskat
          password: ${{ secrets.DOCKER_PASS }}

      - name: 构建并推送
        env:
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
          REPO_ROOT: ${{ github.workspace }}
        run: bash "$REPO_ROOT/20/baseline-node20/build.sh"

  build-node20-alpine:
    name: baseline-node20-alpine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: chiskat
          password: ${{ secrets.DOCKER_PASS }}

      - name: 构建并推送
        env:
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
          REPO_ROOT: ${{ github.workspace }}
        run: bash "$REPO_ROOT/20/baseline-node20-alpine/build.sh"

  build-node20-full:
    name: baseline-node20-full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: chiskat
          password: ${{ secrets.DOCKER_PASS }}

      - name: 构建并推送
        env:
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
          REPO_ROOT: ${{ github.workspace }}
        run: bash "$REPO_ROOT/20/baseline-node20-full/build.sh"

  build-node20-puppeteer:
    name: baseline-node20-puppeteer
    runs-on: ubuntu-latest
    needs: build-node20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: chiskat
          password: ${{ secrets.DOCKER_PASS }}

      - name: 构建并推送
        env:
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
          REPO_ROOT: ${{ github.workspace }}
        run: bash "$REPO_ROOT/20/baseline-node20-puppeteer/build.sh"

  build-node20-full-puppeteer:
    name: baseline-node20-full-puppeteer
    runs-on: ubuntu-latest
    needs: build-node20-full
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: chiskat
          password: ${{ secrets.DOCKER_PASS }}

      - name: 构建并推送
        env:
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
          REPO_ROOT: ${{ github.workspace }}
        run: bash "$REPO_ROOT/20/baseline-node20-full-puppeteer/build.sh"
